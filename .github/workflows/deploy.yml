name: Deploy AI-Craft to Yandex Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ru-central1
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      YC_ENDPOINT_URL: https://storage.yandexcloud.net
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        run: |
          test -n "${AWS_ACCESS_KEY_ID}"
          test -n "${AWS_SECRET_ACCESS_KEY}"
          test -n "${YC_BUCKET_NAME}"

      - name: Install AWS CLI
        run: |
          python -m pip install --upgrade pip
          pip install awscli

      - name: Show deployment target
        run: |
          echo "Bucket: ${YC_BUCKET_NAME}"
          aws --endpoint-url="${YC_ENDPOINT_URL}" s3 ls "s3://${YC_BUCKET_NAME}"

      - name: Deploy
        run: |
          chmod +x deploy.sh
          ./deploy.sh
